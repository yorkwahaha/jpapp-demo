name = "jpapp-tts-proxy"
main = "worker/azure-tts.js"
compatibility_date = "2024-03-20"

# Note: You must configure AZURE_KEY, AZURE_REGION, and CLIENT_TOKEN via `wrangler secret put`

[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[migrations]]
tag = "v1" # Needs to be unique for each migration
new_classes = ["RateLimiter"]
